# rhaii-on-xks configuration

# =============================================================================
# Pull Secret Configuration
# =============================================================================
# Option 1: Use system podman auth (recommended)
#   Requires: ~/.config/containers/auth.json
#   Setup: cp ~/pull-secret.txt ~/.config/containers/auth.json
useSystemPodmanAuth: true

# Option 2: Use pull secret file directly (set useSystemPodmanAuth: false)
pullSecretFile: ""  # e.g., ~/pull-secret.txt

# =============================================================================
# Operators
# =============================================================================

# cert-manager operator (required for TLS)
certManager:
  enabled: true

# sail-operator / Istio (required for gateway)
sailOperator:
  enabled: true

# lws-operator (optional - for multi-node workloads)
lwsOperator:
  enabled: true

# rhcl (Red Hat Connectivity Link) - optional API gateway, auth, rate limiting
# Set to true to deploy RHCL operators (Kuadrant, Authorino, Limitador)
rhclOperator:
  enabled: false
  operators:
    dns:
      enabled: false
  # Namespaces where wasm-plugin-pull-secret is needed (for Envoy proxies).
  # When MaaS is enabled, istio-system is auto-added by the root helmfile.
  gatewayNamespaces: []

# maas (Models as a Service) - optional API gateway, auth, rate limiting, subscriptions
# Requires RHCL and KServe to be deployed first
maas:
  enabled: false
  namespace: opendatahub
  gatewayNamespace: istio-system

# =============================================================================
# KServe
# =============================================================================

# KServe OCI chart version (dev variant until official builds are on registry.redhat.io)
kserveChartVersion: "3.4.0-ea.1-dev-8a30e66"
