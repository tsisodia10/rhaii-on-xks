{{/* Pull secret for registry.redhat.io images (PostgreSQL).
     If the namespace already has a redhat-pull-secret (e.g., from KServe/sail-operator),
     we reuse it rather than creating a conflicting one.
     This template only creates a pull secret when explicitly needed and
     no existing one is expected (e.g., deploying MaaS in a standalone namespace). */}}
{{- if and .Values.pullSecret.dockerConfigJson .Values.pullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.pullSecret.name }}
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.pullSecret.dockerConfigJson | b64enc | quote }}
{{- end }}
