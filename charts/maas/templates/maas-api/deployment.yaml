apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-api
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    app.kubernetes.io/name: maas-api
spec:
  replicas: {{ .Values.maasApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: maas-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maas-api
        app.kubernetes.io/component: api
        {{- include "maas.labels" . | nindent 8 }}
    spec:
      serviceAccountName: maas-api
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 30
      containers:
      - name: maas-api
        image: "{{ .Values.maasApi.image.repository }}:{{ .Values.maasApi.image.tag }}"
        imagePullPolicy: {{ .Values.maasApi.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SECURE
          value: {{ .Values.maasApi.secure | quote }}
        - name: MAAS_SUBSCRIPTION_NAMESPACE
          value: {{ .Values.maasApi.subscriptionNamespace | quote }}
        - name: GATEWAY_NAMESPACE
          value: {{ include "maas.gateway.namespace" . }}
        - name: GATEWAY_NAME
          value: {{ include "maas.gateway.name" . }}
        - name: API_KEY_MAX_EXPIRATION_DAYS
          value: {{ .Values.maasApi.apiKeyMaxExpirationDays | quote }}
        {{- if .Values.postgresql.enabled }}
        - name: DB_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: maas-db-config
              key: DB_CONNECTION_URL
        {{- end }}
        resources:
          {{- toYaml .Values.maasApi.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
