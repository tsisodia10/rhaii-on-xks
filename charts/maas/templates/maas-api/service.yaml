apiVersion: v1
kind: Service
metadata:
  name: maas-api
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    app.kubernetes.io/name: maas-api
spec:
  selector:
    app.kubernetes.io/name: maas-api
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  type: ClusterIP
