apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: maas-api-route
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  parentRefs:
  - name: {{ include "maas.gateway.name" . }}
    namespace: {{ include "maas.gateway.namespace" . }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /maas-api
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
{{- if .Values.azureAD.enabled }}
        - name: X-MaaS-Username
          value: azure-ad-user
{{- else }}
        - name: X-MaaS-Username
          value: anonymous
{{- end }}
        - name: X-MaaS-Group
          value: '["maas-admins"]'
    backendRefs:
    - name: maas-api
      namespace: {{ include "maas.namespace" . }}
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /v1/models
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
{{- if .Values.azureAD.enabled }}
        - name: X-MaaS-Username
          value: azure-ad-user
{{- else }}
        - name: X-MaaS-Username
          value: anonymous
{{- end }}
        - name: X-MaaS-Group
          value: '["maas-admins"]'
    backendRefs:
    - name: maas-api
      namespace: {{ include "maas.namespace" . }}
      port: 8080
