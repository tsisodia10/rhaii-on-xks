apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: gateway-default-deny
  namespace: {{ include "maas.gateway.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-policy
    app.kubernetes.io/managed-by: maas-controller
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "maas.gateway.name" . }}
  defaults:
    limits:
      deny-all-by-default:
        when:
          - predicate: '!request.path.startsWith("/maas-api") && !request.path.startsWith("/v1/models")'
        rates:
          - limit: 0
            window: 1m
