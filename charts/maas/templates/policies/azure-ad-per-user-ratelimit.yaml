{{- if and .Values.azureAD.enabled .Values.azureAD.perUserRateLimit.enabled }}
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: azure-ad-per-user-ratelimit
  namespace: {{ include "maas.gateway.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: azure-ad-auth
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "maas.gateway.name" . }}
  defaults:
    limits:
      per-azure-ad-user:
        rates:
          - limit: {{ .Values.azureAD.perUserRateLimit.limit }}
            window: {{ .Values.azureAD.perUserRateLimit.window }}
        counters:
          - expression: auth.identity.sub
{{- end }}
