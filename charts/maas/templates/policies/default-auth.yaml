{{/*
  Gateway-level default deny AuthPolicy.

  Routes WITHOUT a per-route AuthPolicy (i.e. models without a MaaSAuthPolicy)
  get denied (403). Routes WITH a per-route AuthPolicy (created by the
  MaaSAuthPolicy controller) override these defaults with model-specific rules.

  Per-route AuthPolicies completely replace these defaults (atomic strategy).
*/}}
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: gateway-default-auth
  namespace: {{ include "maas.gateway.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-policy
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "maas.gateway.name" . }}
  defaults:
    rules:
      authentication: {}
      authorization:
        deny-unconfigured-models:
          metrics: false
          priority: 0
          patternMatching:
            patterns:
            - operator: eq
              selector: "context.request.http.method"
              value: "__deny_unconfigured_models__"
