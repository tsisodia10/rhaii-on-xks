{{- if and .Values.azureAD.enabled (not .Values.azureAD.tenantId) }}
  {{- fail "azureAD.tenantId is required when azureAD.enabled is true" }}
{{- end }}
{{- if and .Values.azureAD.enabled (not .Values.azureAD.clientId) }}
  {{- fail "azureAD.clientId is required when azureAD.enabled is true" }}
{{- end }}
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: gateway-default-auth
  namespace: {{ include "maas.gateway.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-policy
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "maas.gateway.name" . }}
  defaults:
    rules:
      authentication:
{{- if .Values.azureAD.enabled }}
        azure-ad:
          jwt:
            issuerUrl: https://login.microsoftonline.com/{{ .Values.azureAD.tenantId }}/v2.0
            audiences:
              - {{ .Values.azureAD.clientId }}
{{- else }}
        anonymous:
          anonymous: {}
{{- end }}
      authorization:
        # Placeholder rule — always passes. Exists so a gateway-level AuthPolicy
        # is present for Kuadrant's policy hierarchy. Route-level AuthPolicies
        # generated by maas-controller override this default per-model.
        allow-all:
          patternMatching:
            patterns:
            - operator: neq
              selector: "context.request.http.method"
              value: ""
