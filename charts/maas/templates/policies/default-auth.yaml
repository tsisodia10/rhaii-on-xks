apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: gateway-default-auth
  namespace: {{ include "maas.gateway.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-policy
    app.kubernetes.io/managed-by: maas-controller
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "maas.gateway.name" . }}
  defaults:
    rules:
      authentication:
{{- if .Values.azureAD.enabled }}
        azure-ad:
          jwt:
            issuerUrl: https://login.microsoftonline.com/{{ .Values.azureAD.tenantId }}/v2.0
            audiences:
              - {{ .Values.azureAD.clientId }}
{{- else }}
        anonymous:
          anonymous: {}
{{- end }}
      authorization:
        deny-unconfigured-models:
          metrics: false
          priority: 0
          patternMatching:
            patterns:
            - operator: eq
              selector: "context.request.http.method"
              value: "__deny_unconfigured_models__"
