# MaaS on xKS configuration

namespace: opendatahub

# Pull secret for registry.redhat.io images (PostgreSQL)
# When sharing namespace with KServe, set create: false to reuse the existing pull secret
pullSecret:
  name: redhat-pull-secret
  create: false
  dockerConfigJson: ""

# MaaS API
maasApi:
  image:
    repository: quay.io/opendatahub/maas-api
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  secure: "false"
  subscriptionNamespace: "models-as-a-service"
  apiKeyMaxExpirationDays: "30"

# MaaS Controller
maasController:
  image:
    repository: quay.io/opendatahub/maas-controller
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  clusterAudience: "https://kubernetes.default.svc"
  subscriptionNamespace: "models-as-a-service"

# Gateway configuration (adapted for Istio on xKS)
gateway:
  name: maas-default-gateway
  namespace: istio-system
  gatewayClassName: istio
  hostname: "*.maas.local"
  listeners:
    http:
      port: 80
    https:
      enabled: false
      port: 443

# PostgreSQL (dev instance for API key storage)
postgresql:
  enabled: true
  image:
    repository: registry.redhat.io/rhel9/postgresql-15
    tag: latest
  database: maas
  storage: emptyDir
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Azure AD integration (optional)
# Adds OIDC authentication at the gateway level via Kuadrant AuthPolicy
azureAD:
  enabled: false
  tenantId: ""       # Azure AD tenant ID (e.g., "12345678-abcd-efgh-ijkl-123456789012")
  clientId: ""       # App Registration client ID
  # Admin group for maas-api access control (Azure AD group object ID)
  # Only members of this group can create subscriptions and API keys
  adminGroup: ""     # e.g., "maas-admins" or a group object ID
  # Per-user rate limit across all API keys (0 = disabled)
  perUserRateLimit:
    enabled: false
    limit: 500
    window: 1h

# Tier mapping for rate limiting
tierMapping:
  tiers: |
    - name: free
      maxTokens: 100
      maxRequests: 10
      period: 1m
    - name: standard
      maxTokens: 1000
      maxRequests: 100
      period: 1m
    - name: premium
      maxTokens: 10000
      maxRequests: 1000
      period: 1m
