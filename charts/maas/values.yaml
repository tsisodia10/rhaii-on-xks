# MaaS on xKS configuration

namespace: opendatahub

# Pull secret for registry.redhat.io images
# dockerConfigJson is populated automatically by helmfile (from ~/.config/containers/auth.json)
# Set create: false to reuse an existing pull secret (e.g., when sharing namespace with KServe)
pullSecret:
  name: redhat-pull-secret
  create: true
  dockerConfigJson: ""

# MaaS API (RHOAI 3.3 productized image)
maasApi:
  image:
    repository: registry.redhat.io/rhoai/odh-maas-api-rhel9
    # v3.3.0 multi-arch (2026-02-18, commit 05c320d) — no human-readable tag published
    tag: "sha256-0c9a170711fd9ae1ce7ae3563446b361a41ed06fc90d570e0096a8229f52de75"
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  secure: "false"
  subscriptionNamespace: "models-as-a-service"
  apiKeyMaxExpirationDays: "30"

# Identity provider for user authentication (replaces OpenShift kubernetesTokenReview on xKS)
# Enable exactly ONE of keycloak or azureAD.

# Keycloak — in-cluster OIDC provider
keycloak:
  enabled: false       # Use Keycloak JWT in AuthPolicy
  deploy: true         # Deploy Keycloak as part of this chart (set false if using Azure AD or external Keycloak)
  namespace: keycloak
  image:
    repository: quay.io/keycloak/keycloak
    tag: "24.0"
  adminUser: admin
  adminPassword: admin
  issuerUrl: ""        # Auto-computed when deploy=true; set manually for external Keycloak
  clientId: maas-gateway
  clientSecret: maas-gateway-secret
  realm: maas
  # Default groups (must match tierMapping.tiers[].groups)
  groups:
    - system:authenticated
  # Demo user created on first startup (set to {} to skip)
  demoUser:
    username: demo-user
    password: demo-password
    email: demo@example.com
    firstName: Demo
    lastName: User
    groups:
      - system:authenticated

# Azure AD — requires App Registration with "Expose an API" configured
# See docs/azure-ad-identity-provider.md for prerequisites
azureAD:
  enabled: false
  tenantId: ""       # Azure AD tenant ID
  clientId: ""       # App Registration client ID
  adminGroup: ""     # Azure AD group for admin access (group object ID or name)

# Gateway configuration (adapted for Istio on xKS)
gateway:
  name: maas-default-gateway
  namespace: istio-system
  gatewayClassName: istio
  hostname: "*.maas.local"
  listeners:
    http:
      port: 80
    https:
      enabled: false
      port: 443

# PostgreSQL for API key and subscription storage
postgresql:
  enabled: true
  image:
    repository: registry.redhat.io/rhel9/postgresql-15
    tag: latest
  database: maas
  auth:
    username: maas
    password: ""         # Set via --set or external secret. Auto-generated if empty.
    existingSecret: ""   # Use an existing Secret instead of creating one (key: POSTGRESQL_PASSWORD)
  storage:
    type: emptyDir       # emptyDir (dev) or persistentVolumeClaim (production)
    pvc:
      size: 1Gi
      storageClassName: ""  # Uses cluster default if empty
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Tier-to-group mapping (must match upstream format — groups field is required)
tierMapping:
  tiers: |
    - name: free
      displayName: Free Tier
      level: 0
      groups:
        - tier-free-users
        - system:authenticated
    - name: premium
      displayName: Premium Tier
      level: 1
      groups:
        - tier-premium-users
    - name: enterprise
      displayName: Enterprise Tier
      level: 2
      groups:
        - tier-enterprise-users
        - admin-group
